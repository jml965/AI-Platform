kind = "web"
previewPath = "/"
title = "Website Builder"
version = "1.0.0"
id = "artifacts/website-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19171
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/website-builder run dev"

[services.env]
PORT = "19171"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/website-builder", "run", "build"]
publicDir = "artifacts/website-builder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
