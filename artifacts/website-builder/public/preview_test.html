interface CarCardProps {
  car: Car;
  onClick?: () => void;
}

const CarCard = ({ car, onClick }) => {
  const formatPrice = (price: number): string => {
    return new Intl.NumberFormat('en-US', {
      style: 'currency',
      currency: 'USD',
      minimumFractionDigits: 0
    }).format(price);
  };

  const formatMileage = (mileage: number): string => {
    return new Intl.NumberFormat('en-US').format(mileage);
  };

  const handleKeyDown = (event: React.KeyboardEvent<HTMLDivElement>): void => {
    if ((event.key === 'Enter' || event.key === ' ') && onClick) {
      event.preventDefault();
      onClick();
    }
  };

  return (
    <div
      className="bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition-shadow duration-300 cursor-pointer"
      onClick={onClick}
      onKeyDown={handleKeyDown}
      role="button"
      tabIndex={onClick ? 0 : undefined}
      aria-label={`View details for ${car.year} ${car.make} ${car.model} - ${formatPrice(car.price)}`}
    >
      <div className="relative h-48 md:h-56 overflow-hidden">
        <img
          src={car.image}
          alt={`${car.year} ${car.make} ${car.model}`}
          className="w-full h-full object-cover hover:scale-105 transition-transform duration-300"
        />
        {car.featured && (
          <span className="absolute top-4 left-4 bg-[var(--primary-orange)] text-white px-3 py-1 rounded-full text-sm font-medium">
            Featured
          </span>
        )}
      </div>
      <div className="p-4">
        <h3 className="text-xl font-semibold mb-2">
          {car.year} {car.make} {car.model}
        </h3>
        <p className="text-2xl font-bold text-[var(--primary-blue)] mb-3">
          {formatPrice(car.price)}
        </p>
        <div className="grid grid-cols-3 gap-3 text-sm text-gray-600">
          <div className="flex items-center space-x-1">
            <Calendar size={16} />
            <span>{car.year}</span>
          </div>
          <div className="flex items-center space-x-1">
            <Gauge size={16} />
            <span>{formatMileage(car.mileage)} mi</span>
          </div>
          <div className="flex items-center space-x-1">
            <MapPin size={16} />
            <span>{car.location.split(',')[0]}</span>
          </div>
        </div>
        <div className="mt-4 flex flex-wrap gap-2">
          <span className="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs">
            {car.transmission}
          </span>
          <span className="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs">
            {car.fuelType}
          </span>
          {car.condition && (
            <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">
              {car.condition}
            </span>
          )}
        </div>
      </div>
    </div>
  );
};

interface SearchBarProps {

}

interface SearchFilters {
  location: string;
  pickupDate: string;
  pickupTime: string;
  returnDate: string;
  returnTime: string;
}

const SearchBar = ({ onSearch }) => {
  const [filters, setFilters] = useState<SearchFilters>({
    location: '',
    pickupDate: '',
    pickupTime: '',
    returnDate: '',
    returnTime: ''

  const handleSubmit = (e: React.FormEvent) => {
    e.preventDefault();
    onSearch(filters);
  };

  const handleChange = (field: keyof SearchFilters) => (e) => {
    setFilters(prev => ({ ...prev, [field]: e.target.value }));
  };

  return (
    <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 mb-8">
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
        <div className="relative">

            placeholder="موقع الاستلام"

            onChange={handleChange('location')}
            className="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            dir="rtl"
          />
        </div>
        
        <div className="relative">
          <Calendar className="absolute right-3 top-3 text-gray-400" size={20} />
          <label htmlFor="pickupDate" className="sr-only">تاريخ الاستلام</label>
          <input
            id="pickupDate"
            type="date"
            placeholder="تاريخ الاستلام"
            value={filters.pickupDate}
            onChange={handleChange('pickupDate')}
            className="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>
        
        <div className="relative">
          <Clock className="absolute right-3 top-3 text-gray-400" size={20} />
          <label htmlFor="pickupTime" className="sr-only">وقت الاستلام</label>
          <input

            className="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"

          <label htmlFor="returnDate" className="sr-only">تاريخ الإرجاع</label>

            className="w-full px-4 py-3 pr-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"

interface UsePaginationProps<T> {
  items: T[];
  itemsPerPage: number;
}

interface UsePaginationReturn<T> {
  currentPage: number;
  totalPages: number;
  currentItems: T[];
  goToPage: (page: number) => void;
  nextPage: () => void;
  prevPage: () => void;
}

function usePagination<T>({ items, itemsPerPage }: UsePaginationProps<T>): UsePaginationReturn<T> {
  const [currentPage, setCurrentPage] = useState(1);

  const totalPages = Math.ceil(items.length / itemsPerPage);

  const currentItems = useMemo(() => {
    const startIndex = (currentPage - 1) * itemsPerPage;
    const endIndex = startIndex + itemsPerPage;
    return items.slice(startIndex, endIndex);
  }, [items, currentPage, itemsPerPage]);

  const goToPage = (page: number) => {
    const pageNumber = Math.max(1, Math.min(page, totalPages));
    setCurrentPage(pageNumber);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const nextPage = () => {
    goToPage(currentPage + 1);
  };

  const prevPage = () => {
    goToPage(currentPage - 1);
  };

  return {
    currentPage,
    totalPages,
    currentItems,
    goToPage,
    nextPage,
    prevPage
  };
}

const BookingModal = ({ car, isOpen, onClose, language }) => {
  const [step, setStep] = useState(1);
  const [formData, setFormData] = useState({
    pickupDate: '',
    returnDate: '',
    pickupTime: '10:00',
    returnTime: '10:00',
    pickupLocation: car.location,
    name: '',
    email: '',
    phone: '',
    cardNumber: '',
    expiryDate: '',
    cvv: ''

  const isRTL = language === 'ar';

  if (!isOpen) return null;

  const handleInputChange = (e) => {
    setFormData({ ...formData, [e.target.name]: e.target.value });

  const calculateDays = () => {
    if (formData.pickupDate && formData.returnDate) {
      const pickup = new Date(formData.pickupDate);
      const returnD = new Date(formData.returnDate);
      const diffTime = Math.abs(returnD.getTime() - pickup.getTime());
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      return diffDays || 1;
    }
    return 1;
  };

  const totalPrice = calculateDays() * car.price;

    if (step === 1 && formData.pickupDate && formData.returnDate) {

interface PaginationProps {
  currentPage: number;
  totalPages: number;
  onPageChange: (page: number) => void;
  language: 'ar' | 'en';
}

const Pagination = ({ currentPage, totalPages, onPageChange, language }) => {
  const isRTL = language === 'ar';
  
  const renderPageNumbers = () => {
    const pageNumbers = [];
    const maxVisiblePages = 5;
    
    let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
    let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
    
    if (endPage - startPage < maxVisiblePages - 1) {
      startPage = Math.max(1, endPage - maxVisiblePages + 1);
    }
    
    for (let i = startPage; i <= endPage; i++) {
      pageNumbers.push(
        <button
          key={i}
          onClick={() => onPageChange(i)}
          className={`px-3 py-2 mx-1 rounded-lg transition-colors ${
            currentPage === i
              ? 'bg-blue-600 text-white'
              : 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-50'
          }`}
        >
          {i}
        </button>
      );
    }
    
    return pageNumbers;
  };

  return (
    <div className="flex justify-center items-center mt-8" dir={isRTL ? 'rtl' : 'ltr'}>
      <button
        onClick={() => onPageChange(currentPage - 1)}
        disabled={currentPage === 1}
        className="p-2 mx-1 rounded-lg bg-white border border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"

        className="p-2 mx-1 rounded-lg bg-white border border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"

interface FilterOptions {
  categories: string[];
  priceRange: [number, number];
  seats: number[];
  fuelTypes: string[];
  transmissions: string[];
  locations: string[];
}

function filterCars(cars: Car[], filters: FilterOptions, searchTerm: string): Car[] {
  return cars.filter(car => {
    // Search term filter
    if (searchTerm) {
      const searchLower = searchTerm.toLowerCase();
      const matchesSearch = 
        (car.name?.toLowerCase().includes(searchLower) || false) ||
        (car.category?.toLowerCase().includes(searchLower) || false) ||
        car.location.toLowerCase().includes(searchLower) ||
        car.make.toLowerCase().includes(searchLower) ||
        car.model.toLowerCase().includes(searchLower);
      
      if (!matchesSearch) return false;
    }

    // Category filter
    if (filters.categories.length > 0 && car.category && !filters.categories.includes(car.category)) {
      return false;
    }

    // Price filter
    if (car.price < filters.priceRange[0] || car.price > filters.priceRange[1]) {
      return false;
    }

    // Seats filter
    if (filters.seats.length > 0 && car.seats && !filters.seats.includes(car.seats)) {
      return false;
    }

    // Fuel type filter
    if (filters.fuelTypes.length > 0 && !filters.fuelTypes.includes(car.fuelType)) {
      return false;
    }

    // Transmission filter
    if (filters.transmissions.length > 0 && !filters.transmissions.includes(car.transmission)) {
      return false;
    }

    // Location filter
    if (filters.locations.length > 0 && !filters.locations.includes(car.location)) {
      return false;
    }

    return true;
  });
}

function sortCars(cars: Car[], sortBy: string): Car[] {
  const sorted = [...cars];
  
  switch (sortBy) {
    case 'price-low':
      return sorted.sort((a, b) => a.price - b.price);
    case 'price-high':
      return sorted.sort((a, b) => b.price - a.price);
    case 'name':
      return sorted.sort((a, b) => (a.name || a.model).localeCompare(b.name || b.model));
    case 'featured':
      return sorted.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));
    default:
      return sorted;
  }
}


function useLocalStorage<T>(key: string, initialValue: T): [T, (value: T) => void] {
  // Get initial value from localStorage or use the provided initial value
  const [storedValue, setStoredValue] = useState<T>(() => {
    try {
      const item = window.localStorage.getItem(key);
      return item ? JSON.parse(item) : initialValue;
    } catch (error) {
      console.error(`Error reading localStorage key "${key}":`, error);
      return initialValue;
    }
  });

  // Update localStorage when value changes
  const setValue = (value: T) => {
    try {
      setStoredValue(value);
      window.localStorage.setItem(key, JSON.stringify(value));
    } catch (error) {
      console.error(`Error setting localStorage key "${key}":`, error);
    }
  };

  return [storedValue, setValue];
}
